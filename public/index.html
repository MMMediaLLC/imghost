<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>imghost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #c8c8c8;
      --muted: #555;
      --accent: #e8ff47;
      --accent2: #47ffe0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    #auth-screen h1 {
      color: var(--accent);
      font-size: 22px;
      letter-spacing: 0.1em;
    }

    #auth-screen p { color: var(--muted); font-size: 12px; }

    #auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
    }

    input[type="password"], input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 16px;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover { background: var(--accent); color: #0d0d0d; }

    .btn-sm {
      font-size: 11px;
      padding: 5px 10px;
    }

    .btn-danger {
      border-color: #ff4747;
      color: #ff4747;
    }

    .btn-danger:hover { background: #ff4747; color: #0d0d0d; }

    #auth-error { color: #ff4747; font-size: 12px; display: none; }

    /* ── MAIN APP ── */
    #app { display: none; max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header h1 { color: var(--accent); font-size: 20px; }
    header span { color: var(--muted); font-size: 11px; }

    /* ── DROP ZONE ── */
    #drop-zone {
      border: 2px dashed var(--border);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 24px;
      position: relative;
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.04);
    }

    #drop-zone p { color: var(--muted); margin-bottom: 8px; }
    #drop-zone .hint { font-size: 11px; color: #3a3a3a; }
    #drop-zone .accent-text { color: var(--accent); }

    #file-input { display: none; }

    /* ── PROGRESS ── */
    #progress-bar-wrap {
      display: none;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      height: 6px;
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s;
    }

    #progress-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      display: none;
    }

    /* ── LAST UPLOAD RESULT ── */
    #result-box {
      display: none;
      border: 1px solid var(--accent2);
      padding: 16px;
      margin-bottom: 24px;
      background: rgba(71, 255, 224, 0.03);
    }

    #result-box .label { color: var(--accent2); font-size: 11px; margin-bottom: 10px; }

    #result-url-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #result-url {
      color: var(--text);
      flex: 1;
      word-break: break-all;
      font-size: 13px;
      min-width: 0;
    }

    #copy-btn {
      white-space: nowrap;
      border-color: var(--accent2);
      color: var(--accent2);
    }

    #copy-btn:hover { background: var(--accent2); color: #0d0d0d; }

    /* ── GALLERY ── */
    #gallery-section h2 {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 14px;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .gallery-item {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .gallery-item:hover { border-color: #3a3a3a; }

    .gallery-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .gallery-item-info {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .gallery-item-name {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-item-actions { display: flex; gap: 6px; }

    #empty-gallery { color: var(--muted); font-size: 12px; padding: 20px 0; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>imghost</h1>
  <p>enter password to continue</p>
  <form id="auth-form">
    <input type="password" id="password-input" placeholder="password" autocomplete="current-password" />
    <button type="submit" class="btn">unlock</button>
  </form>
  <span id="auth-error">wrong password</span>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>imghost</h1>
    <span>jpg · png · gif · webp · svg · max 20mb</span>
  </header>

  <div id="drop-zone">
    <p><span class="accent-text">click to upload</span> or drag &amp; drop</p>
    <p class="hint">ctrl+v to paste from clipboard</p>
    <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.gif,.webp,.svg" multiple />
  </div>

  <div id="progress-label">uploading...</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <div id="result-box">
    <div class="label">// last upload</div>
    <div id="result-url-row">
      <span id="result-url"></span>
      <button class="btn btn-sm" id="copy-btn">copy url</button>
    </div>
  </div>

  <div id="gallery-section">
    <h2>recent uploads</h2>
    <div id="gallery"><span id="empty-gallery">no images yet</span></div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'imghost_token';

  function getToken() { return sessionStorage.getItem(TOKEN_KEY); }
  function setToken(t) { sessionStorage.setItem(TOKEN_KEY, t); }

  function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({ 'x-auth-token': getToken() }, opts.headers || {});
    return fetch(url, opts);
  }

  // ── AUTH ──
  const authScreen = document.getElementById('auth-screen');
  const appEl = document.getElementById('app');
  const authForm = document.getElementById('auth-form');
  const pwInput = document.getElementById('password-input');
  const authError = document.getElementById('auth-error');

  async function tryAuth(password) {
    const res = await fetch('/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    return data.ok === true;
  }

  async function checkExistingToken() {
    if (!getToken()) return false;
    const res = await apiFetch('/images');
    return res.ok;
  }

  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = pwInput.value.trim();
    if (!pw) return;
    const ok = await tryAuth(pw);
    if (ok) {
      setToken(pw);
      showApp();
    } else {
      authError.style.display = 'block';
      pwInput.value = '';
      pwInput.focus();
    }
  });

  function showApp() {
    authScreen.style.display = 'none';
    appEl.style.display = 'block';
    loadGallery();
  }

  (async () => {
    if (await checkExistingToken()) showApp();
  })();

  // ── UPLOAD ──
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const progressWrap = document.getElementById('progress-bar-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  const resultBox = document.getElementById('result-box');
  const resultUrl = document.getElementById('result-url');
  const copyBtn = document.getElementById('copy-btn');

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadFiles(files);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadFiles([...fileInput.files]);
    fileInput.value = '';
  });

  document.addEventListener('paste', (e) => {
    if (!appEl || appEl.style.display === 'none') return;
    const items = [...e.clipboardData.items].filter(i => i.type.startsWith('image/'));
    if (!items.length) return;
    const files = items.map(i => i.getAsFile()).filter(Boolean);
    if (files.length) uploadFiles(files);
  });

  async function uploadFiles(files) {
    for (const file of files) {
      await uploadOne(file);
    }
  }

  function uploadOne(file) {
    return new Promise((resolve) => {
      const fd = new FormData();
      fd.append('file', file);

      progressLabel.style.display = 'block';
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload');
      xhr.setRequestHeader('x-auth-token', getToken());

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          progressBar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
        }
      });

      xhr.addEventListener('load', () => {
        progressLabel.style.display = 'none';
        progressWrap.style.display = 'none';
        progressBar.style.width = '0%';

        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          showResult(data.url);
          loadGallery();
        } else {
          alert('Upload failed: ' + xhr.status);
        }
        resolve();
      });

      xhr.addEventListener('error', () => {
        progressLabel.style.display = 'none';
        progressWrap.style.display = 'none';
        alert('Upload error');
        resolve();
      });

      xhr.send(fd);
    });
  }

  function showResult(url) {
    resultBox.style.display = 'block';
    resultUrl.textContent = url;
    copyBtn.onclick = () => copyToClipboard(url, copyBtn);
  }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  // ── GALLERY ──
  const gallery = document.getElementById('gallery');
  const emptyGallery = document.getElementById('empty-gallery');

  async function loadGallery() {
    const res = await apiFetch('/images');
    if (!res.ok) return;
    const images = await res.json();

    gallery.innerHTML = '';
    if (!images.length) {
      gallery.appendChild(document.createTextNode(''));
      const el = document.createElement('span');
      el.id = 'empty-gallery';
      el.textContent = 'no images yet';
      gallery.appendChild(el);
      return;
    }

    for (const img of images) {
      gallery.appendChild(makeGalleryItem(img));
    }
  }

  function makeGalleryItem({ url, filename }) {
    const item = document.createElement('div');
    item.className = 'gallery-item';

    const thumb = document.createElement('img');
    thumb.src = url;
    thumb.alt = filename;
    thumb.loading = 'lazy';

    const info = document.createElement('div');
    info.className = 'gallery-item-info';

    const name = document.createElement('div');
    name.className = 'gallery-item-name';
    name.textContent = filename;

    const actions = document.createElement('div');
    actions.className = 'gallery-item-actions';

    const cpBtn = document.createElement('button');
    cpBtn.className = 'btn btn-sm';
    cpBtn.textContent = 'copy';
    cpBtn.style.borderColor = 'var(--accent2)';
    cpBtn.style.color = 'var(--accent2)';
    cpBtn.addEventListener('mouseover', () => { cpBtn.style.background = 'var(--accent2)'; cpBtn.style.color = '#0d0d0d'; });
    cpBtn.addEventListener('mouseout', () => { cpBtn.style.background = ''; cpBtn.style.color = 'var(--accent2)'; });
    cpBtn.onclick = () => copyToClipboard(url, cpBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-sm btn-danger';
    delBtn.textContent = 'del';
    delBtn.onclick = async () => {
      if (!confirm(`delete ${filename}?`)) return;
      const res = await apiFetch(`/images/${filename}`, { method: 'DELETE' });
      if (res.ok) {
        item.remove();
        if (!gallery.querySelector('.gallery-item')) loadGallery();
      }
    };

    actions.append(cpBtn, delBtn);
    info.append(name, actions);
    item.append(thumb, info);
    return item;
  }
</script>
</body>
</html>
