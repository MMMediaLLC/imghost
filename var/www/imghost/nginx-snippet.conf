# Nginx Reverse Proxy Configuration Snippet
# Place this in /etc/nginx/sites-available/imghost
# Then link it: ln -s /etc/nginx/sites-available/imghost /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name imghost.yourdomain.com; # Replace with your actual domain name

    # Increase client upload size limit to match our 20MB uploader limit
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3001; # Connects to node server listening on port 3001
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real client IPs to our application logs
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
